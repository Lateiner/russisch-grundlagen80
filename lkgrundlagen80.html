<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vokabel-Lernkartei: Russisch</title>
    <style>
        :root {
            --primary-green: #2d6a4f;
            --light-green: #d8f3dc;
            --accent-green: #52b788;
            --bg-color: #f0f9f4;
            --card-white: #ffffff;
            --text-dark: #1b4332;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        h1 {
            color: var(--primary-green);
            margin-bottom: 20px;
            font-size: 1.8rem;
        }

        /* Fortschrittsanzeige */
        .progress {
            margin-bottom: 10px;
            font-weight: bold;
            color: var(--primary-green);
        }

        /* Karteikarten-Bereich */
        .flashcard-container {
            perspective: 1000px;
            width: 100%;
            height: 300px;
            cursor: pointer;
            margin-bottom: 30px;
        }

        .flashcard {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-radius: 15px;
        }

        .flashcard.is-flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            background: var(--card-white);
            border: 2px solid var(--accent-green);
            border-radius: 15px;
        }

        .card-back {
            transform: rotateY(180deg);
            background-color: var(--light-green);
        }

        .word-text {
            font-weight: bold;
            word-wrap: break-word;
            max-width: 100%;
            margin: 0;
        }

        .note-text {
            font-size: 0.9rem;
            color: #555;
            margin-top: 15px;
            font-style: italic;
        }

        /* Steuerungs-Buttons */
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .full-width {
            grid-column: span 2;
        }

        button {
            padding: 12px 20px;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background-color: var(--primary-green);
            color: white;
            transition: background 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:hover {
            background-color: var(--accent-green);
        }

        button:active {
            transform: scale(0.98);
        }

        button.secondary {
            background-color: #6c757d;
        }

        button.secondary:hover {
            background-color: #5a6268;
        }

        .keyboard-hint {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #777;
        }

        @media (max-width: 480px) {
            .flashcard-container { height: 250px; }
            h1 { font-size: 1.4rem; }
            .keyboard-hint { display: none; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Russisch Lernkartei</h1>
        
        <div class="progress" id="progress">1 / 45</div>

        <div class="flashcard-container" id="cardContainer">
            <div class="flashcard" id="card">
                <div class="card-face card-front">
                    <p class="word-text" id="frontText"></p>
                    <p class="note-text" id="frontNote"></p>
                </div>
                <div class="card-face card-back">
                    <p class="word-text" id="backText"></p>
                    <p class="note-text" id="backNote"></p>
                </div>
            </div>
        </div>

        <div class="controls">
            <button onclick="prevCard()">← Vorherige</button>
            <button onclick="nextCard()">Nächste →</button>
            <button class="secondary" onclick="goToStart()">🏠 An den Anfang</button>
            <button class="secondary" onclick="shuffleCards()">🎲 Mischen</button>
        </div>

        <div class="keyboard-hint">
            Tastatur: Pfeiltasten (← →) Navigation | Leertaste/Enter: Umdrehen | Pos1: Anfang
        </div>
    </div>

    <script>
        // Die Vokabeldaten
        const rawData = [
            "оте́ц – Vater",
            "отцо́в – Vaters (Possessivadjektiv)",
            "дед – Großvater",
            "де́дов – Großvaters (Possessivadjektiv)",
            "сосе́д – Nachbar",
            "сосе́дов – Nachbars (Possessivadjektiv)",
            "врач – Arzt",
            "враче́в – des Arztes (Possessivadjektiv)",
            "по́вар – Koch",
            "поваро́в – des Kochs (Possessivadjektiv)",
            "пиджа́к – Sakko, Jackett",
            "су́мkа – Tasche",
            "я́блоко – Apfel",
            "боти́нkи – Schuhe, Stiefeletten",
            "дом – Haus",
            "сад – Garten",
            "письмо́ – Brief",
            "кни́га – Buch",
            "ключ – Schlüssel",
            "чемода́н – Koffer",
            "рюkза́к – Rucksack",
            "шкаф – Schrank",
            "очки́ – Brille",
            "окно́ – Fenster",
            "принадле́жность – Zugehörigkeit",
            "склоне́ние – Deklination",
            "паде́ж – Fall (Kasus)",
            "су́ффиkс – Suffix",
            "фами́лия – Nachname",
            "изуча́ть / изучи́ть – lernen, studieren",
            "продолжа́ть / продо́лжить – fortsetzen, weitermachen",
            "обсужда́ть / обсуди́ть – besprechen, diskutieren",
            "расска́зывать / рассказа́ть – erzählen",
            "изменя́ть / измени́ть – verändern, abwandeln",
            "учи́ть / научи́ть – lehren, beibringen",
            "запомина́ть / запо́мнить – sich merken, einprägen",
            "склоня́ть / просклоня́ть – deklinieren",
            "тренирова́ться / потренирова́ться – üben, trainieren",
            "путеше́ствовать / попутеше́ствовать – reisen",
            "ви́деть / уви́деть – sehen",
            "подходи́ть / подойти́ – herantreten, zugehen auf",
            "стоя́ть / постоя́ть – stehen",
            "разгова́ривать / поговори́ть – sich unterhalten, sprechen",
            "помога́ть / помо́чь – helfen",
            "сравни́вать / сравни́ть – vergleichen"
        ];

        // Daten parsen
        let vocabulary = rawData.map(line => {
            // Nummerierung am Anfang entfernen (z.B. "1. ")
            let cleanLine = line.replace(/^\d+\.\s*/, "");
            let [front, back] = cleanLine.split(" – ");
            
            // Zusatzinfos in Klammern extrahieren (falls vorhanden)
            let noteMatch = back.match(/\((.*)\)/);
            let note = noteMatch ? noteMatch[0] : "";
            let cleanBack = back.replace(/\s*\(.*\)/, "");

            return {
                front: front.trim(),
                back: cleanBack.trim(),
                note: note.trim()
            };
        });

        let currentIndex = 0;
        let isFlipped = false;
        let currentDeck = [...vocabulary];

        // DOM Elemente
        const card = document.getElementById('card');
        const frontText = document.getElementById('frontText');
        const backText = document.getElementById('backText');
        const backNote = document.getElementById('backNote');
        const progress = document.getElementById('progress');
        const cardContainer = document.getElementById('cardContainer');

        function updateUI() {
            const item = currentDeck[currentIndex];
            
            // Karte zurückdrehen bevor Text geändert wird
            isFlipped = false;
            card.classList.remove('is-flipped');

            // Text setzen
            frontText.innerText = item.front;
            backText.innerText = item.back;
            backNote.innerText = item.note;

            // Schriftgröße anpassen
            adjustFontSize(frontText, item.front);
            adjustFontSize(backText, item.back);

            // Fortschritt
            progress.innerText = `${currentIndex + 1} / ${currentDeck.length}`;
        }

        function adjustFontSize(element, text) {
            if (text.length > 30) {
                element.style.fontSize = "1.2rem";
            } else if (text.length > 15) {
                element.style.fontSize = "1.5rem";
            } else {
                element.style.fontSize = "2rem";
            }
        }

        function flipCard() {
            isFlipped = !isFlipped;
            card.classList.toggle('is-flipped');
        }

        function nextCard() {
            if (currentIndex < currentDeck.length - 1) {
                currentIndex++;
                updateUI();
            }
        }

        function prevCard() {
            if (currentIndex > 0) {
                currentIndex--;
                updateUI();
            }
        }

        function goToStart() {
            currentIndex = 0;
            updateUI();
        }

        function shuffleCards() {
            for (let i = currentDeck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [currentDeck[i], currentDeck[j]] = [currentDeck[j], currentDeck[i]];
            }
            currentIndex = 0;
            updateUI();
        }

        // Event Listener
        cardContainer.addEventListener('click', flipCard);

        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case ' ':
                case 'Enter':
                    e.preventDefault();
                    flipCard();
                    break;
                case 'ArrowRight':
                    nextCard();
                    break;
                case 'ArrowLeft':
                    prevCard();
                    break;
                case 'Home':
                    goToStart();
                    break;
            }
        });

        // Initialisierung
        updateUI();
    </script>
</body>
</html>
