<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transformation: Substantiv zu Possessivadjektiv</title>
    <script src="https://cdn.jsdelivr.net/npm/drag-drop-touch@1.3.1/DragDropTouch.js"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --success-bg: #d4edda;
            --success-border: #28a745;
            --error-bg: #f8d7da;
            --error-border: #dc3545;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1, h2 { color: var(--primary-color); text-align: center; margin-bottom: 10px; }

        .intro-section {
            background: #eef6fc;
            padding: 20px;
            border-left: 5px solid var(--secondary-color);
            border-radius: 4px;
            margin-bottom: 30px;
        }

        .exercise-card {
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            background: #fafafa;
        }

        .transformation-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            font-size: 1.1rem;
            margin-bottom: 10px;
        }

        .origin {
            color: #7f8c8d;
            font-style: italic;
            min-width: 180px;
        }

        .arrow { color: var(--secondary-color); font-weight: bold; }

        select {
            font-size: 1rem;
            padding: 6px 10px;
            border: 2px solid #bdc3c7;
            border-radius: 6px;
            outline: none;
            cursor: pointer;
            transition: all 0.3s;
        }

        .correct {
            background-color: var(--success-bg) !important;
            border-color: var(--success-border) !important;
            color: #155724 !important;
        }

        .incorrect {
            background-color: var(--error-bg) !important;
            border-color: var(--error-border) !important;
            color: #721c24 !important;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        button {
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            transition: opacity 0.2s;
        }

        .btn-reset { background-color: #95a5a6; color: white; }
        .btn-sol { background-color: var(--secondary-color); color: white; }

        @media (max-width: 600px) {
            .container { padding: 15px; }
            .transformation-row { flex-direction: column; align-items: flex-start; gap: 5px; }
            select { width: 100%; }
            .origin { min-width: auto; }
            .arrow { transform: rotate(90deg); margin: 5px 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Russische Grammatik</h1>
    <h2>Aufgabe 4: Transformation (Substantiv &rarr; Adjektiv)</h2>

    <div class="intro-section">
        <h3>Einführung</h3>
        <p>Wandle die Besitzanzeige um. Statt des Genitivs (z. B. <i>пиджак отца</i>) soll ein Possessivadjektiv verwendet werden (z. B. <i>отцов пиджак</i>).</p>
        <p>Achte auf die Übereinstimmung in <b>Genus (Geschlecht)</b> und <b>Kasus (Fall)</b>!</p>
    </div>

    <div id="exercise-list">
        <!-- JS generiert die Aufgaben -->
    </div>
</div>

<script>
    const exercises = [
        { from: "Книга отца", opts: ["отцов", "отцова", "отцово"], ans: "отцова", to: "книга" },
        { from: "Сад деда", opts: ["дедов", "дедова", "дедову"], ans: "дедов", to: "сад" },
        { from: "Машина Андрея", opts: ["Андреев", "Андреева", "Андреево"], ans: "Андреева", to: "машина" },
        { from: "Письмо Игоря", opts: ["Игорев", "Игорева", "Игорево"], ans: "Игорево", to: "письмо" },
        { from: "Друг соседа", opts: ["соседов", "соседова", "соседово"], ans: "соседов", to: "друг" },
        { from: "Совет врача", opts: ["врачев", "врачева", "врачево"], ans: "врачев", to: "совет" },
        { from: "Очки дедушки", opts: ["дедушкин", "дедушковы", "дедушков"], ans: "дедушков", to: "очки (Pl.)" },
        { from: "Дом зятя", opts: ["зятев", "зятева", "зятево"], ans: "зятев", to: "дом" },
        { from: "Слова лева", opts: ["львов", "львовы", "львова"], ans: "львовы", to: "слова (Pl.)" },
        { from: "Сын повара", opts: ["поваров", "поварова", "поварево"], ans: "поваров", to: "сын" },
        { from: "Имя Сергея", opts: ["Сергеев", "Сергеево", "Сергеева"], ans: "Сергеево", to: "имя (Neutr.)" },
        { from: "Сумка мужа", opts: ["мужев", "мужева", "мужево"], ans: "мужеva", to: "сумка" },
        { from: "Хвост кота", opts: ["котов", "котова", "котово"], ans: "котов", to: "хвост" },
        { from: "Работа учителя", opts: ["учителев", "учителева", "учителево"], ans: "учителева", to: "работа" },
        { from: "Телефон брата", opts: ["братов", "братова", "братово"], ans: "братов", to: "телефон" },
        { from: "Ручка Николая", opts: ["Николаев", "Николаева", "Николаево"], ans: "Николаева", to: "ручка" },
        { from: "Пальто царя", opts: ["царев", "царево", "царева"], ans: "царево", to: "пальто" },
        { from: "Окно соседа", opts: ["соседов", "соседово", "соседова"], ans: "соседово", to: "окно" },
        { from: "Голос Алексея", opts: ["Алексеев", "Алексеева", "Алексеево"], ans: "Алексеев", to: "голос" },
        { from: "Вещи Петра", opts: ["Петров", "Петрова", "Петровы"], ans: "Петровы", to: "вещи (Pl.)" }
    ];

    function render() {
        const container = document.getElementById('exercise-list');
        exercises.forEach((ex, i) => {
            const card = document.createElement('div');
            card.className = 'exercise-card';

            const row = document.createElement('div');
            row.className = 'transformation-row';
            
            const originSpan = document.createElement('span');
            originSpan.className = 'origin';
            originSpan.innerText = ex.from;

            const arrowSpan = document.createElement('span');
            arrowSpan.className = 'arrow';
            arrowSpan.innerText = "➔";

            const select = document.createElement('select');
            select.id = `sel-${i}`;
            select.innerHTML = `<option value="">---</option>` + 
                ex.opts.map(opt => `<option value="${opt}">${opt}</option>`).join('');

            select.onchange = () => {
                if (select.value === ex.ans) {
                    select.className = "correct";
                } else if (select.value === "") {
                    select.className = "";
                } else {
                    select.className = "incorrect";
                }
            };

            const targetSpan = document.createElement('span');
            targetSpan.innerText = ex.to;

            row.appendChild(originSpan);
            row.appendChild(arrowSpan);
            row.appendChild(select);
            row.appendChild(targetSpan);

            const btnGroup = document.createElement('div');
            btnGroup.className = 'button-group';

            const btnRes = document.createElement('button');
            btnRes.className = 'btn-reset';
            btnRes.innerText = 'Zurücksetzen';
            btnRes.onclick = () => {
                select.value = "";
                select.className = "";
            };

            const btnSol = document.createElement('button');
            btnSol.className = 'btn-sol';
            btnSol.innerText = 'Lösung';
            btnSol.onclick = () => {
                select.value = ex.ans;
                select.className = "correct";
            };

            btnGroup.appendChild(btnRes);
            btnGroup.appendChild(btnSol);

            card.appendChild(row);
            card.appendChild(btnGroup);
            container.appendChild(card);
        });
    }

    window.onload = render;
</script>

</body>
</html>
