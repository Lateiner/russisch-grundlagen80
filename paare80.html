<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory: Russische Possessivadjektive</title>
    <script src="https://cdn.jsdelivr.net/npm/drag-drop-touch@1.3.1/DragDropTouch.js"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --bg: #f4f7f6;
            --card-back: #34495e;
            --card-front: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 850px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1, h2 { color: var(--primary); text-align: center; margin: 10px 0; }

        .intro-box {
            background: #eef6fc;
            padding: 15px;
            border-left: 5px solid var(--secondary);
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 0.95rem;
        }

        /* Memory Grid */
        .memory-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            perspective: 1000px;
            margin-bottom: 20px;
            min-height: 450px;
        }

        .memory-card {
            height: 100px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s, opacity 0.6s ease-out;
            cursor: pointer;
        }

        .memory-card.flipped {
            transform: rotateY(180deg);
        }

        /* Wenn ein Paar gefunden wurde */
        .memory-card.matched {
            opacity: 0;
            pointer-events: none;
            cursor: default;
        }

        /* Für die Lösungsanzeige (Paare farbig) */
        .memory-card.sol-mode {
            opacity: 1 !important;
            pointer-events: none;
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
            font-weight: bold;
            font-size: 1.1rem;
            text-align: center;
            padding: 5px;
            box-sizing: border-box;
            border: 2px solid #ddd;
        }

        .card-back {
            background-color: var(--card-back);
            color: white;
            font-size: 2rem;
            border: none;
        }

        .card-front {
            background-color: var(--card-front);
            color: var(--primary);
            transform: rotateY(180deg);
        }

        .card-front span {
            font-size: 0.75rem;
            color: #666;
            margin-top: 6px;
            font-weight: normal;
            display: block;
        }

        /* Farben für die Paare im Lösungsmodus */
        .pair-0 .card-front { background-color: #FFD1DC; border-color: #ff85a2; }
        .pair-1 .card-front { background-color: #B2E2F2; border-color: #4fc3f7; }
        .pair-2 .card-front { background-color: #C3F0CA; border-color: #66bb6a; }
        .pair-3 .card-front { background-color: #FFFACD; border-color: #fdd835; }
        .pair-4 .card-front { background-color: #E6E6FA; border-color: #9575cd; }
        .pair-5 .card-front { background-color: #FFE4B5; border-color: #ffb74d; }
        .pair-6 .card-front { background-color: #D1FFBD; border-color: #9ccc65; }
        .pair-7 .card-front { background-color: #FADADD; border-color: #f06292; }

        /* Buttons */
        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .btn-reset { background-color: #95a5a6; color: white; }
        .btn-sol { background-color: var(--secondary); color: white; }
        button:hover { opacity: 0.9; transform: translateY(-2px); }

        @media (max-width: 650px) {
            .memory-grid { grid-template-columns: repeat(3, 1fr); min-height: 550px; }
        }

        @media (max-width: 450px) {
            .memory-grid { grid-template-columns: repeat(2, 1fr); min-height: 850px; }
            .memory-card { height: 90px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Russische Grammatik</h1>
    <h2>Memory: Possessivadjektive</h2>

    <div class="intro-box">
        <b>Spielanleitung:</b> Finde die zusammengehörigen Formen im <b>gleichen Fall</b> (z.B. Maskulinum + Femininum). 
        Korrekte Paare verschwinden vom Spielfeld. Mit „Lösungen zeigen“ werden alle Paare farblich sortiert aufgedeckt.
    </div>

    <div class="memory-grid" id="grid">
        <!-- Karten werden per JS generiert -->
    </div>

    <div class="controls">
        <button class="btn-reset" onclick="resetGame()">Neues Spiel</button>
        <button class="btn-sol" onclick="revealAll()">Lösungen zeigen</button>
    </div>
</div>

<script>
    const pairs = [
        { a: "отцов", b: "отцова", label: "Nominativ (M/F)" },
        { a: "отцова ", b: "отцовой", label: "Genitiv (M/F)" },
        { a: "отцову", b: "отцовой ", label: "Dativ (M/F)" },
        { a: "отцовым", b: "отцовой  ", label: "Instrumental (M/F)" },
        { a: "отцовом", b: "отцовой   ", label: "Präpositional (M/F)" },
        { a: "отцово", b: "отцовы", label: "Neutrum / Plural" },
        { a: "Андреев", b: "Андреева", label: "Nom. Name (M/F)" },
        { a: "Андрееве", b: "Андреевой", label: "Präp. Name (M/F)" }
    ];

    let flippedCards = [];
    let lockBoard = false;

    function createBoard() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        let cardData = [];
        
        pairs.forEach((pair, index) => {
            cardData.push({ text: pair.a.trim(), pairId: index, label: pair.label });
            cardData.push({ text: pair.b.trim(), pairId: index, label: pair.label });
        });

        // Zufällige Mischung
        cardData.sort(() => Math.random() - 0.5);

        cardData.forEach((data) => {
            const card = document.createElement('div');
            card.className = `memory-card pair-${data.pairId}`;
            card.dataset.pairId = data.pairId;

            card.innerHTML = `
                <div class="card-face card-back">?</div>
                <div class="card-face card-front">
                    ${data.text}
                    <span>${data.label}</span>
                </div>
            `;

            card.addEventListener('click', flipCard);
            grid.appendChild(card);
        });
    }

    function flipCard() {
        if (lockBoard) return;
        if (this === flippedCards[0]) return;
        if (this.classList.contains('matched')) return;

        this.classList.add('flipped');

        if (flippedCards.length === 0) {
            flippedCards.push(this);
            return;
        }

        flippedCards.push(this);
        checkMatch();
    }

    function checkMatch() {
        const isMatch = flippedCards[0].dataset.pairId === flippedCards[1].dataset.pairId;

        if (isMatch) {
            lockBoard = true;
            // Kurze Verzögerung, damit man die zweite Karte noch sieht, bevor sie verschwindet
            setTimeout(() => {
                flippedCards[0].classList.add('matched');
                flippedCards[1].classList.add('matched');
                resetBoard();
            }, 600);
        } else {
            lockBoard = true;
            setTimeout(() => {
                flippedCards[0].classList.remove('flipped');
                flippedCards[1].classList.remove('flipped');
                resetBoard();
            }, 1000);
        }
    }

    function resetBoard() {
        flippedCards = [];
        lockBoard = false;
    }

    function resetGame() {
        resetBoard();
        createBoard();
    }

    function revealAll() {
        document.querySelectorAll('.memory-card').forEach(card => {
            card.className = `memory-card flipped sol-mode pair-${card.dataset.pairId}`;
        });
    }

    // Initialisierung
    window.onload = createBoard;
</script>

</body>
</html>
